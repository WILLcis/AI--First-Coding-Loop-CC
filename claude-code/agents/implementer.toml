name = "implementer"
description = "按架构师任务模板执行实现:先输出计划+风险等确认,再写代码、生成测试,确保 make test-integration 通过。不评审自己的产出。"
# 推荐档:Anthropic Sonnet / OpenAI gpt-4o / DeepSeek deepseek-coder / Qwen qwen-coder-plus / Kimi moonshot-v1-32k
provider = "anthropic"
model = "claude-sonnet-4-6"
reasoning = "medium"
tools = ["Read", "Write", "Edit", "Bash", "Grep", "Glob"]
max_iterations = 25

prompt_skill = "architect-task-writer"   # 默认配合的 skill
required_skills = ["feature-flag-setup"] # 任何新功能强制走这个
optional_skills = ["api-endpoint-creator"]

[budget]
max_input_tokens = 80000
max_output_tokens = 8000
